spring.application.name=AIService
eureka.client.serviceUrl.defaultZone=http://localhost:8760/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
server.port=8084
spring.data.mongodb.uri=mongodb://localhost:27017/fitnessrecommendations
spring.data.mongodb.database=fitnessrecommendations
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.exchange.name=fitness.exchange
rabbitmq.queue.name=activity.queue
rabbitmq.routing.key=activity.tracking
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}

